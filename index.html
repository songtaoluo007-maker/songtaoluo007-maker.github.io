<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗松涛 — 把想法造成产品</title>
<meta name="description" content="跨平台独立开发者作品集：Android / HarmonyOS / Web / AI，5 个独立产品的案例与故事。">
<meta property="og:title" content="罗松涛 — 把想法造成产品">
<meta property="og:description" content="跨平台独立开发者作品集：Android / HarmonyOS / Web / AI。">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%232dd4a7'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070709; --bg2:#0c0c0f; --panel:#101014;
  --ink:#f5f3ee; --ink2:#cfccc1; --mut:#a8a69d; --dim:#79776f;
  --line:#222226; --line2:#2e2e34;
  --accent:#2dd4a7;
  --serif:'Noto Serif SC',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#06120e}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--mono)}
.wrap{max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)}

.grain{position:fixed;inset:-50%;width:200%;height:200%;z-index:90;pointer-events:none;opacity:.05;animation:grain 8s steps(10) infinite}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-5%,-10%)}20%{transform:translate(-15%,5%)}30%{transform:translate(7%,-25%)}40%{transform:translate(-5%,25%)}50%{transform:translate(-15%,10%)}60%{transform:translate(15%,0)}70%{transform:translate(0,15%)}80%{transform:translate(3%,35%)}90%{transform:translate(-10%,10%)}}

.cur{display:none}
@media(pointer:fine){
  body,a,button{cursor:none}
  .cur{display:block;position:fixed;left:0;top:0;width:12px;height:12px;border-radius:50%;background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:300;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease)}
  .cur.big{width:52px;height:52px}
}

nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(7,7,9,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom-color:var(--line)}
nav .bar{display:flex;justify-content:space-between;align-items:center;padding:20px clamp(20px,5vw,64px);max-width:1200px;margin:0 auto}
nav .logo{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--ink)}
nav .logo b{color:var(--accent);font-weight:400}
nav .links{display:flex;gap:clamp(18px,3vw,40px)}
nav .links a{font-size:13px;color:var(--mut);position:relative;padding:4px 0;transition:color .3s}
nav .links a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--accent);transition:width .35s var(--ease)}
nav .links a:hover{color:var(--ink)}
nav .links a:hover::after{width:100%}

.hero{position:relative;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.hero canvas{position:absolute;inset:0;width:100%;height:100%}
.hero::before,.contact::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 120% 95% at 50% 38%,transparent 38%,rgba(7,7,9,.72) 100%)}
.hero .inner{position:relative;z-index:2;padding-bottom:clamp(36px,7vh,84px)}
.kicker{font-family:var(--mono);font-size:12px;letter-spacing:6px;color:var(--dim);margin-bottom:clamp(18px,3vh,32px)}
.hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(64px,13vw,168px);line-height:1.04;letter-spacing:.01em;margin-bottom:14px}
.hero .tag{font-family:var(--serif);font-weight:400;font-size:clamp(22px,3.4vw,40px);color:var(--ink2);margin-bottom:clamp(28px,5vh,56px)}
.hero .foot{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;border-top:1px solid var(--line);padding-top:20px}
.hero .foot .sub{font-family:var(--mono);font-size:12.5px;color:var(--dim);letter-spacing:.06em}
.hero .foot .hint{font-family:var(--mono);font-size:12px;color:var(--dim);white-space:nowrap}
.hero .foot .hint i{display:inline-block;animation:bob 2.2s var(--ease) infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

.stats{border-bottom:1px solid var(--line);background:var(--bg)}
.stats .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:clamp(48px,9vh,96px) 0}
.stat .num{font-family:var(--serif);font-weight:700;font-size:clamp(44px,6vw,76px);line-height:1;color:var(--ink)}
.stat .num em{font-style:normal;color:var(--accent)}
.stat .lbl{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:10px;letter-spacing:.08em}

.sec-head{display:flex;align-items:baseline;gap:18px;padding:clamp(72px,12vh,140px) 0 clamp(36px,6vh,64px)}
.sec-head .idx{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:2px}
.sec-head h2{font-family:var(--serif);font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.2}

.case{display:grid;grid-template-columns:minmax(0,7fr) minmax(0,5fr);gap:clamp(32px,6vw,88px);align-items:center;padding:clamp(48px,9vh,110px) 0;border-top:1px solid var(--line)}
.case.flip .txt{order:2}
.case.flip .vis{order:1}
.case .tag{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:2.5px;margin-bottom:20px}
.case h3{font-family:var(--serif);font-weight:900;font-size:clamp(40px,5.6vw,68px);line-height:1.12}
.case .en{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:3px;margin:6px 0 18px}
.case .pos{font-size:clamp(16px,1.8vw,19px);color:var(--ink2);line-height:1.75;margin-bottom:30px}
.case .row{display:flex;gap:16px;margin-bottom:14px}
.case .row .k{font-family:var(--mono);font-size:12px;color:var(--dim);flex-shrink:0;width:42px;padding-top:3px}
.case .row .v{font-size:14px;color:var(--mut);line-height:1.8}
.case .pills{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 30px}
.case .pills span{font-family:var(--mono);font-size:12px;color:var(--ink2);border:1px solid var(--line2);border-radius:5px;padding:4px 12px}
.case .lnks{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.case .lnk{font-family:var(--mono);font-size:13px;color:var(--ink);display:inline-flex;align-items:center;gap:8px;border-bottom:1px solid var(--line2);padding-bottom:5px;transition:border-color .3s,color .3s}
.case .lnk:hover{color:var(--accent);border-color:var(--accent)}
.btn-demo{font-family:var(--mono);font-size:13px;color:var(--accent);border:1px solid rgba(45,212,167,.45);border-radius:8px;padding:11px 22px;transition:background .3s,color .3s,border-color .3s}
.btn-demo:hover{background:var(--accent);border-color:var(--accent);color:#06120e}
video.shot{aspect-ratio:auto;max-height:540px;width:auto;max-width:100%;margin:0 auto;display:block}
.case .vis{position:relative}
.case .shot{display:block;width:100%;border:1px solid var(--line2);border-radius:12px}
.case .ph{aspect-ratio:4/4.7;max-width:430px;margin:0 auto;border-radius:12px;padding:clamp(16px,2vw,24px);position:relative;overflow:hidden;border:1px solid}
.case .ph .tb{display:flex;gap:6px;margin-bottom:16px}
.case .ph .tb i{width:8px;height:8px;border-radius:50%;display:block;opacity:.55}
.case .ph .bar{height:9px;border-radius:3px;margin-bottom:10px}
.case .ph svg{width:100%;display:block;margin:14px 0}
.case .ph .cards{display:flex;gap:10px;margin:14px 0}
.case .ph .cards i{display:block;flex:1;height:54px;border-radius:8px}
.case .ph .ft{position:absolute;left:clamp(16px,2vw,24px);bottom:16px;font-family:var(--mono);font-size:11px;opacity:.5}

.works .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;padding-bottom:clamp(60px,10vh,120px)}
.work{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:30px 28px;display:flex;flex-direction:column;min-height:300px;transition:transform .45s var(--ease),border-color .45s,background .45s}
.work:hover{transform:translateY(-6px);border-color:var(--line2);background:var(--panel)}
.work .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.work .no{font-family:var(--mono);font-size:12px;color:var(--dim)}
.work .pf{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid rgba(45,212,167,.25);border-radius:4px;padding:2px 9px;letter-spacing:1px}
.work h4{font-family:var(--serif);font-weight:700;font-size:24px;margin-bottom:12px}
.work p{font-size:13.5px;color:var(--mut);line-height:1.85;flex:1}
.work .bot{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}
.work .stk{font-family:var(--mono);font-size:11.5px;color:var(--dim)}
.work .go{font-family:var(--mono);font-size:12px;color:var(--ink2);transition:color .3s}
.work a.go:hover{color:var(--accent)}
.work .priv{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px}

.about{border-top:1px solid var(--line);background:var(--bg2)}
.about .grid{display:grid;grid-template-columns:minmax(0,6fr) minmax(0,5fr);gap:clamp(40px,7vw,100px);padding:clamp(72px,12vh,150px) 0}
.about h2{font-family:var(--serif);font-weight:700;font-size:clamp(30px,4vw,48px);line-height:1.25;margin-bottom:26px}
.about .txt{font-size:15.5px;color:var(--mut);line-height:2}
.about .pl{border-top:1px solid var(--line2)}
.about .pl .row{display:flex;justify-content:space-between;align-items:baseline;padding:20px 4px;border-bottom:1px solid var(--line2);transition:padding .35s var(--ease)}
.about .pl .row:hover{padding-left:14px}
.about .pl .n{font-family:var(--serif);font-size:21px;font-weight:700}
.about .pl .d{font-family:var(--mono);font-size:12px;color:var(--dim)}

.contact{position:relative;min-height:92svh;display:flex;flex-direction:column;justify-content:center;overflow:hidden;border-top:1px solid var(--line)}
.contact canvas{position:absolute;inset:0;width:100%;height:100%}
.contact .inner{position:relative;z-index:2;text-align:center;padding:80px 20px 40px}
.contact .k{font-family:var(--mono);font-size:12px;letter-spacing:6px;color:var(--dim);margin-bottom:26px}
.contact h2{font-family:var(--serif);font-weight:900;font-size:clamp(56px,11vw,140px);line-height:1.1;margin-bottom:18px}
.contact .sub{font-size:15px;color:var(--mut);margin-bottom:48px}
.contact .mail{font-family:var(--mono);font-size:clamp(16px,2.6vw,24px);color:var(--ink);border-bottom:1px solid var(--line2);padding-bottom:8px;transition:color .3s,border-color .3s}
.contact .mail:hover{color:var(--accent);border-color:var(--accent)}
.contact .gh{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;color:var(--dim);margin-top:34px;transition:color .3s}
.contact .gh:hover{color:var(--ink)}
.contact .inner-foot{position:relative;z-index:2}

.marq{overflow:hidden;border-top:1px solid var(--line);padding:18px 0;position:relative;z-index:2}
.marq .track{display:flex;width:max-content;animation:marq 36s linear infinite}
.marq span{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--dim);white-space:nowrap;padding-right:8px}
.marq span b{color:var(--accent);font-weight:400}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
footer{position:relative;z-index:2;text-align:center;font-family:var(--mono);font-size:11.5px;color:#55544e;padding:22px 20px 28px}

.rv{opacity:0;transform:translateY(30px);transition:opacity .9s var(--ease),transform .9s var(--ease);transition-delay:var(--d,0s)}
.rv.on{opacity:1;transform:none}

@media(max-width:900px){
  .case{grid-template-columns:1fr;gap:40px}
  .case.flip .txt{order:1}
  .case.flip .vis{order:2}
  .works .grid{grid-template-columns:1fr}
  .work{min-height:0}
  .about .grid{grid-template-columns:1fr;gap:48px}
  .stats .grid{grid-template-columns:repeat(2,1fr);gap:40px 16px}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .rv{opacity:1;transform:none;transition:none}
  .marq .track,.hero .foot .hint i,.grain{animation:none}
}
</style>
</head>
<body>
<div class="cur" id="cur"></div>
<div class="grain" id="grain"></div>
<nav id="nav"><div class="bar">
  <a href="#top" class="logo" id="logo"></a>
  <div class="links">
    <a href="#works">作品</a><a href="#about">关于</a><a href="#contact">联系</a>
  </div>
</div></nav>
<main id="app"></main>

<script src="content.js"></script>
<script>
const C = window.CONTENT;
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
document.title = C.site.title;
document.querySelector('meta[name="description"]').content = C.site.description;
document.getElementById('logo').innerHTML = C.site.nameEn.replace(/ /g,'&nbsp;') + '&nbsp;<b>●</b>';

const TONES = {
  green:{panel:'#0d1f1a',border:'#1d3b33',accent:'#2dd4a7',block:'#15302a'},
  blue:{panel:'#0e1320',border:'#22304d',accent:'#6c9ef8',block:'#141d33'},
  amber:{panel:'#1f150d',border:'#3b2d1d',accent:'#f0b35e',block:'#302415'},
  purple:{panel:'#150f20',border:'#2d2345',accent:'#a78bfa',block:'#211733'}
};

function caseVisual(cs){
  if(cs.video) return `<video class="shot para" src="${cs.video}" autoplay muted loop playsinline ${cs.image?`poster="${cs.image}"`:''} aria-label="${cs.title} 实机演示"></video>`;
  if(cs.image) return `<img class="shot para" src="${cs.image}" alt="${cs.title} 界面截图">`;
  const t = TONES[cs.tone] || TONES.green;
  return `<div class="ph para" style="background:${t.panel};border-color:${t.border}">
    <div class="tb"><i style="background:${t.accent}"></i><i style="background:${t.border}"></i><i style="background:${t.border}"></i></div>
    <div class="bar" style="width:46%;background:${t.border}"></div>
    <div class="bar" style="width:68%;background:${t.block}"></div>
    <svg viewBox="0 0 300 78" preserveAspectRatio="none" aria-hidden="true">
      <polyline points="0,64 40,46 80,54 120,28 160,38 200,16 240,26 300,8" fill="none" stroke="${t.accent}" stroke-width="2.5"/>
      <polyline points="0,70 50,62 100,66 150,52 200,58 250,44 300,40" fill="none" stroke="${t.border}" stroke-width="2"/>
    </svg>
    <div class="cards"><i style="background:${t.block}"></i><i style="background:${t.block}"></i></div>
    <div class="bar" style="width:54%;background:${t.block}"></div>
    <div class="bar" style="width:38%;background:${t.block}"></div>
    <div class="ft" style="color:${t.accent}">${cs.titleEn || cs.title} — preview</div>
  </div>`;
}

document.getElementById('app').innerHTML = `
<section class="hero" id="top">
  <canvas id="au1"></canvas>
  <div class="wrap inner">
    <div class="kicker rv" style="--d:.05s">${C.hero.kicker}</div>
    <h1 class="rv" style="--d:.15s">${C.site.nameZh}</h1>
    <div class="tag rv" style="--d:.3s">${C.hero.tagline}</div>
    <div class="foot rv" style="--d:.45s">
      <div class="sub">${C.hero.subtitle}</div>
      <div class="hint">${C.hero.scrollHint} <i>↓</i></div>
    </div>
  </div>
</section>

<section class="stats"><div class="wrap grid">
  ${C.stats.map((s,i)=>`<div class="stat rv" style="--d:${i*.08}s"><div class="num"><span class="cnt" data-v="${s.value}">0</span><em>·</em></div><div class="lbl">${s.label}</div></div>`).join('')}
</div></section>

<section id="works"><div class="wrap">
  <div class="sec-head rv"><span class="idx">01 — 精选案例</span><h2>作品，和它们的故事</h2></div>
  ${C.cases.map((cs,i)=>`
  <div class="case${i%2?' flip':''}">
    <div class="txt">
      <div class="tag rv">${cs.tag}</div>
      <h3 class="rv" style="--d:.08s">${cs.title}</h3>
      <div class="en rv" style="--d:.1s">${cs.titleEn||''}</div>
      <p class="pos rv" style="--d:.14s">${cs.positioning}</p>
      <div class="row rv" style="--d:.2s"><span class="k">挑战</span><span class="v">${cs.challenge}</span></div>
      <div class="row rv" style="--d:.26s"><span class="k">方案</span><span class="v">${cs.solution}</span></div>
      <div class="row rv" style="--d:.32s"><span class="k">成果</span><span class="v">${cs.outcome}</span></div>
      <div class="pills rv" style="--d:.38s">${cs.stack.map(s=>`<span>${s}</span>`).join('')}</div>
      <div class="lnks rv" style="--d:.42s">
        ${cs.demo?`<a class="btn-demo" href="${cs.demo}" target="_blank" rel="noopener">${cs.demoLabel||'在线试用'} ↗</a>`:''}
        ${cs.link?`<a class="lnk" href="${cs.link}" target="_blank" rel="noopener">${cs.linkLabel||'查看项目'} →</a>`:''}
      </div>
    </div>
    <div class="vis rv" style="--d:.2s">${caseVisual(cs)}</div>
  </div>`).join('')}
</div></section>

<section class="works"><div class="wrap">
  <div class="sec-head rv"><span class="idx">02 — 更多作品</span><h2>同样从零到一</h2></div>
  <div class="grid">
    ${C.works.map((w,i)=>`
    <div class="work rv" style="--d:${i*.1}s">
      <div class="top"><span class="no">0${i+3}</span><span class="pf">${w.platform}</span></div>
      <h4>${w.title}</h4>
      <p>${w.desc}</p>
      <div class="bot"><span class="stk">${w.stack}</span>
        ${w.link?`<a class="go" href="${w.link}" target="_blank" rel="noopener">仓库 →</a>`:`<span class="priv">PRIVATE</span>`}
      </div>
    </div>`).join('')}
  </div>
</div></section>

<section class="about" id="about"><div class="wrap grid">
  <div>
    <div class="sec-head" style="padding:0 0 10px"><span class="idx">03 — 关于</span></div>
    <h2 class="rv">${C.about.heading}</h2>
    <p class="txt rv" style="--d:.12s">${C.about.text}</p>
  </div>
  <div class="pl rv" style="--d:.2s;align-self:end">
    ${C.about.platforms.map(p=>`<div class="row"><span class="n">${p.name}</span><span class="d">${p.detail}</span></div>`).join('')}
  </div>
</div></section>

<section class="contact" id="contact">
  <canvas id="au2"></canvas>
  <div class="inner">
    <div class="k rv">04 — CONTACT</div>
    <h2 class="rv" style="--d:.1s">${C.contact.headline}</h2>
    <p class="sub rv" style="--d:.18s">${C.contact.sub}</p>
    <div class="rv" style="--d:.26s"><a class="mail" href="mailto:${C.contact.email}">${C.contact.email}</a></div>
    <div class="rv" style="--d:.34s"><a class="gh" href="${C.contact.github}" target="_blank" rel="noopener">GitHub ↗</a></div>
  </div>
  <div class="inner-foot">
    <div class="marq"><div class="track">${(`<span>${C.contact.marquee.replace(/—/g,'<b>—</b>')}</span>`).repeat(8)}</div></div>
    <footer>© 2026 ${C.site.nameZh} — 手写，无框架。</footer>
  </div>
</section>`;

const grainC = document.createElement('canvas'); grainC.width = grainC.height = 180;
const gx = grainC.getContext('2d'); const gd = gx.createImageData(180,180);
for(let i=0;i<gd.data.length;i+=4){const v=(Math.random()*255)|0; gd.data[i]=gd.data[i+1]=gd.data[i+2]=v; gd.data[i+3]=255;}
gx.putImageData(gd,0,0);
document.getElementById('grain').style.backgroundImage = `url(${grainC.toDataURL()})`;

function aurora(id, blobs){
  const cv = document.getElementById(id); if(!cv) return;
  const x = cv.getContext('2d');
  const scale = Math.min(devicePixelRatio||1, 1.5);
  let w,h,run=false,raf=0,mx=.5,my=.5,tx=.5,ty=.5;
  const blur = innerWidth<768 ? 42 : 68;
  function rs(){ w=cv.width=cv.offsetWidth*scale; h=cv.height=cv.offsetHeight*scale; }
  rs(); addEventListener('resize', rs);
  if(matchMedia('(pointer:fine)').matches){
    cv.parentElement.addEventListener('pointermove', e=>{
      const r=cv.getBoundingClientRect(); tx=(e.clientX-r.left)/r.width; ty=(e.clientY-r.top)/r.height;
    });
  }
  function paint(t){
    mx+=(tx-mx)*.04; my+=(ty-my)*.04;
    x.filter='none'; x.globalAlpha=1;
    x.fillStyle='#070709'; x.fillRect(0,0,w,h);
    x.filter=`blur(${blur}px)`;
    for(const b of blobs){
      const bx=(b.x+Math.sin(t*b.vx+b.p)*b.ax+(mx-.5)*b.pr)*w;
      const by=(b.y+Math.cos(t*b.vy+b.p)*b.ay+(my-.5)*b.pr)*h;
      x.globalAlpha=b.a; x.fillStyle=b.c;
      x.beginPath(); x.arc(bx,by,b.r*Math.min(w,h),0,7); x.fill();
    }
    x.filter='none'; x.globalAlpha=1;
  }
  function loop(t){ if(!run) return; paint(t); raf=requestAnimationFrame(loop); }
  if(RM){ paint(0); return; }
  new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting && !run){ run=true; raf=requestAnimationFrame(loop); }
    else if(!e.isIntersecting && run){ run=false; cancelAnimationFrame(raf); }
  })).observe(cv);
}
aurora('au1',[
  {x:.16,y:.30,r:.34,c:'#3730a3',vx:.00011,vy:.00007,ax:.11,ay:.09,p:0,a:.5,pr:.05},
  {x:.62,y:.18,r:.28,c:'#0f766e',vx:-.00009,vy:.00012,ax:.10,ay:.09,p:2,a:.4,pr:.08},
  {x:.88,y:.62,r:.24,c:'#b45309',vx:.00007,vy:-.00009,ax:.08,ay:.07,p:4,a:.28,pr:.06},
  {x:.38,y:.88,r:.30,c:'#1e3a8a',vx:-.00006,vy:.00008,ax:.09,ay:.06,p:5,a:.36,pr:.04}
]);
aurora('au2',[
  {x:.22,y:.28,r:.32,c:'#3730a3',vx:.00009,vy:.00006,ax:.09,ay:.08,p:1,a:.4,pr:.06},
  {x:.78,y:.68,r:.28,c:'#0f766e',vx:-.00007,vy:.0001,ax:.09,ay:.07,p:3,a:.32,pr:.08},
  {x:.55,y:.06,r:.22,c:'#b45309',vx:.00006,vy:-.00008,ax:.07,ay:.05,p:5,a:.22,pr:.05}
]);

const obs = new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){ e.target.classList.add('on'); obs.unobserve(e.target); }
}),{threshold:.12,rootMargin:'0px 0px -6% 0px'});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));

const cObs = new IntersectionObserver(es=>es.forEach(e=>{
  if(!e.isIntersecting) return;
  const el=e.target, end=+el.dataset.v, t0=performance.now(), dur=1300;
  if(RM){ el.textContent=end; cObs.unobserve(el); return; }
  (function tick(now){
    const p=Math.min((now-t0)/dur,1), v=Math.round(end*(1-Math.pow(1-p,3)));
    el.textContent=v;
    if(p<1) requestAnimationFrame(tick);
  })(t0);
  cObs.unobserve(el);
}),{threshold:.6});
document.querySelectorAll('.cnt').forEach(el=>cObs.observe(el));

const nav=document.getElementById('nav');
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>50),{passive:true});

let pr=[]; function collectPara(){ pr=[...document.querySelectorAll('.para')]; }
collectPara();
if(!RM){
  let ticking=false;
  addEventListener('scroll',()=>{
    if(ticking) return; ticking=true;
    requestAnimationFrame(()=>{
      const vh=innerHeight;
      for(const el of pr){
        const r=el.getBoundingClientRect();
        if(r.bottom<0||r.top>vh) continue;
        const off=((r.top+r.height/2)-vh/2)*-.06;
        el.style.transform=`translateY(${off.toFixed(1)}px)`;
      }
      ticking=false;
    });
  },{passive:true});
}

if(matchMedia('(pointer:fine)').matches && !RM){
  const cur=document.getElementById('cur');
  let cx=innerWidth/2,cy=innerHeight/2,px=cx,py=cy;
  addEventListener('pointermove',e=>{cx=e.clientX;cy=e.clientY});
  (function follow(){
    px+=(cx-px)*.18; py+=(cy-py)*.18;
    cur.style.transform=`translate(${px}px,${py}px) translate(-50%,-50%)`;
    requestAnimationFrame(follow);
  })();
  document.addEventListener('mouseover',e=>{
    cur.classList.toggle('big', !!e.target.closest('a,button,.work'));
  });
}
